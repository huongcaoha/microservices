spring.application.name=Api_Gateway
server.port=8080

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/

spring.cloud.gateway.routes[0].id=customer-service-route

#lb là load balance - t? ??ng cân b?ng t?i
spring.cloud.gateway.routes[0].uri=lb://CustomerService

spring.cloud.gateway.routes[0].predicates[0]=Path=/api/v1/auth/**

#spring.cloud.gateway.routes[0].filters[0]=AddResponseHeader=X-System-Name, API-Gateway-System

spring.cloud.gateway.routes[1].id=order-service-route
spring.cloud.gateway.routes[1].uri=lb://OrderService
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/v1/orders/**
#spring.cloud.gateway.routes[1].predicates[0]=Path=/v1/order-api/**
#spring.cloud.gateway.routes[1].filters[0]=RewritePath=/v1/order-api/(?<segment>.*), /api/v1/orders/$\\{segment}

spring.cloud.gateway.routes[2].id=patient-service-route
spring.cloud.gateway.routes[2].uri=lb://patient-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/v1/patients/**

spring.cloud.gateway.routes[3].id=appointment-service-route
spring.cloud.gateway.routes[3].uri=lb://appointment-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/v1/appointments/**

spring.cloud.gateway.routes[4].id=doctor-service-route
spring.cloud.gateway.routes[4].uri=lb://doctor-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/v1/doctors/**