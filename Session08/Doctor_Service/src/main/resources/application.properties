spring.application.name=doctor-service
server.port=8085
spring.config.import=configserver:http://localhost:8888

management.endpoints.web.exposure.include=refresh

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

resilience4j.ratelimiter.instances.searchDoctorLimit.limit-for-period=5
resilience4j.ratelimiter.instances.searchDoctorLimit.limit-refresh-period=10s
resilience4j.ratelimiter.instances.searchDoctorLimit.timeout-duration=0


resilience4j.timelimiter.instances.insuranceTimeout.timeout-duration=1s
